<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔法视频扭蛋机</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #fff4b8, #ffd1dc);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #222;
      overflow-x: hidden;
    }

    .app {
      width: 390px;
      max-width: 100vw;
      min-height: 100vh;
      padding: 28px 20px;
      text-align: center;
      position: relative;
    }

    h1 {
      font-size: 34px;
      line-height: 1.05;
      margin: 20px 0 8px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.82;
      margin-bottom: 24px;
    }

    .machine {
      width: 260px;
      height: 340px;
      margin: 0 auto 26px;
      border-radius: 36px;
      background: #ff4d6d;
      position: relative;
      box-shadow: 0 16px 0 #c9184a, 0 24px 35px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .glass {
      width: 205px;
      height: 175px;
      background: rgba(255,255,255,0.75);
      border-radius: 50%;
      margin: 24px auto 0;
      border: 8px solid white;
      position: relative;
      overflow: hidden;
    }

    .ball {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      position: absolute;
      box-shadow: inset -8px -8px 0 rgba(0,0,0,0.08);
    }

    .ball:nth-child(1) { left: 20px; top: 82px; background: #ffd60a; }
    .ball:nth-child(2) { left: 78px; top: 92px; background: #4cc9f0; }
    .ball:nth-child(3) { left: 132px; top: 76px; background: #b5179e; }
    .ball:nth-child(4) { left: 48px; top: 36px; background: #80ed99; }
    .ball:nth-child(5) { left: 108px; top: 28px; background: #ff8fab; }
    .ball:nth-child(6) { left: 82px; top: 66px; background: #ffbe0b; }

    .slot {
      width: 110px;
      height: 34px;
      border-radius: 20px;
      background: #111;
      margin: 24px auto 0;
    }

    .knob {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      margin: 18px auto 0;
      border: 8px solid #ffd60a;
      position: relative;
    }

    .knob:after {
      content: "";
      width: 50px;
      height: 10px;
      background: #ff4d6d;
      position: absolute;
      left: 11px;
      top: 31px;
      border-radius: 8px;
    }

    .machine.shake {
      animation: shake 0.12s infinite;
    }

    .machine.shake .knob {
      animation: spin 0.45s linear infinite;
    }

    .machine.shake .ball {
      animation: bounce 0.22s infinite alternate;
    }

    @keyframes shake {
      0% { transform: translateX(0) rotate(0); }
      25% { transform: translateX(-5px) rotate(-1deg); }
      50% { transform: translateX(5px) rotate(1deg); }
      75% { transform: translateX(-4px) rotate(-1deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    @keyframes spin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    button {
      border: none;
      background: #111;
      color: white;
      padding: 16px 30px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.72;
      font-weight: bold;
    }

    .falling-egg {
      display: none;
      position: fixed;
      left: 50%;
      top: 52%;
      width: 88px;
      height: 110px;
      margin-left: -44px;
      border-radius: 50% 50% 46% 46%;
      background: linear-gradient(180deg, #fff, #ffd60a);
      box-shadow: 0 18px 30px rgba(0,0,0,0.25);
      z-index: 50;
      animation: eggDrop 0.9s ease-in forwards;
    }

    .falling-egg:after {
      content: "";
      position: absolute;
      left: 12px;
      top: 18px;
      width: 64px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
    }

    @keyframes eggDrop {
      0% {
        transform: translateY(-170px) scale(0.8) rotate(-12deg);
        opacity: 0;
      }
      60% {
        transform: translateY(20px) scale(1.05) rotate(8deg);
        opacity: 1;
      }
      100% {
        transform: translateY(0) scale(1) rotate(0);
        opacity: 1;
      }
    }

    .egg-crack {
      animation: crack 0.42s ease-in-out forwards;
    }

    @keyframes crack {
      0% { transform: scale(1) rotate(0); }
      25% { transform: scale(1.08) rotate(-8deg); }
      50% { transform: scale(1.08) rotate(8deg); }
      100% { transform: scale(0.2) rotate(0); opacity: 0; }
    }

    .video-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.88);
      padding: 0;
    }

    .video-card {
      width: 100vw;
      max-width: 100vw;
      height: 100vh;
      margin: 0;
      background: #000;
      border-radius: 0;
      padding: 12px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      box-shadow: none;
      animation: popIn 0.25s ease-out;
    }

    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      padding: 0;
      font-size: 28px;
      line-height: 42px;
      background: #111;
      color: white;
      box-shadow: none;
      z-index: 3;
    }

    .video-title {
      font-size: 20px;
      line-height: 1.1;
      margin: 54px 44px 10px;
      color: white;
    }

    video {
      width: 100%;
      height: 72vh;
      max-height: 72vh;
      background: #000;
      border-radius: 16px;
      object-fit: contain;
      box-shadow: none;
    }

    .video-copy {
      font-size: 14px;
      line-height: 1.35;
      margin: 10px auto 14px;
      max-width: 320px;
      opacity: 0.9;
      color: white;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .actions button {
      flex: 1;
      max-width: 170px;
      padding: 14px 12px;
      font-size: 15px;
    }

    .secondary-btn {
      background: white;
      color: #111;
      border: 2px solid #111;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    }

    @media (max-height: 720px) {
      h1 {
        font-size: 30px;
      }

      .machine {
        width: 230px;
        height: 300px;
      }

      .glass {
        width: 180px;
        height: 150px;
      }

      .video-card {
        justify-content: center;
        padding-top: 12px;
      }

      .video-title {
        font-size: 18px;
        margin-top: 48px;
      }

      video {
        height: 68vh;
        max-height: 68vh;
      }
    }
  </style>
</head>

<body>
  <audio id="clickSound" src="audio/click.mp3" preload="auto"></audio>
  <audio id="spinSound" src="audio/spin.mp3" preload="auto"></audio>
  <audio id="popSound" src="audio/pop.mp3" preload="auto"></audio>
  <div class="app">
    <h1>魔法视频扭蛋机</h1>
    <div class="subtitle">点一下按钮，摇出一个惊喜视频蛋！</div>

    <div class="machine" id="machine">
      <div class="glass">
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
      </div>
      <div class="slot"></div>
      <div class="knob"></div>
    </div>

    <button id="spinBtn">摇一摇</button>

    
  </div>

  <div class="falling-egg" id="fallingEgg"></div>

  <div class="video-overlay" id="videoOverlay">
    <div class="video-card">
      <button class="close-btn" id="closeVideo">×</button>

      <h2 class="video-title" id="videoTitle">惊喜视频</h2>

      <video id="resultVideo" controls playsinline></video>

      <div class="video-copy" id="videoCopy">
        你摇出了一个惊喜视频！
      </div>

      <div class="actions">
        <button id="playAgainBtn">再摇一次</button>
        <button class="secondary-btn" id="replayBtn">再看一遍</button>
      </div>
    </div>
  </div>

  <script>
    const videoPool = Array.from({ length: 12 }, (_, i) => {
      const num = String(i + 1).padStart(2, "0");
      return {
        title: `惊喜视频 ${num}`,
        src: `videos/video${num}.mp4`,
        copy: "你摇出了一个好玩的惊喜视频！"
      };
    });

    const machine = document.getElementById("machine");
    const spinBtn = document.getElementById("spinBtn");
    const fallingEgg = document.getElementById("fallingEgg");

    const videoOverlay = document.getElementById("videoOverlay");
    const closeVideo = document.getElementById("closeVideo");
    const resultVideo = document.getElementById("resultVideo");
    const videoTitle = document.getElementById("videoTitle");
    const videoCopy = document.getElementById("videoCopy");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const replayBtn = document.getElementById("replayBtn");

    const clickSound = document.getElementById("clickSound");
    const spinSound = document.getElementById("spinSound");
    const popSound = document.getElementById("popSound");

    function playSound(sound, volume = 0.8) {
      if (!sound) return;
      sound.pause();
      sound.currentTime = 0;
      sound.volume = volume;
      sound.play().catch(() => {
        console.log("Sound blocked or missing:", sound.src);
      });
    }

    let currentVideo = null;

    function getRandomVideo() {
      const index = Math.floor(Math.random() * videoPool.length);
      return videoPool[index];
    }

    function openVideo(videoItem) {
      currentVideo = videoItem;

      videoTitle.innerText = videoItem.title;
      videoCopy.innerText = videoItem.copy;
      resultVideo.src = videoItem.src;
      resultVideo.currentTime = 0;

      videoOverlay.style.display = "block";
      document.body.style.overflow = "hidden";

      resultVideo.play().catch(() => {
        console.log("Autoplay blocked. User can tap play.");
      });
    }

    function closeVideoModal() {
      resultVideo.pause();
      resultVideo.removeAttribute("src");
      resultVideo.load();

      videoOverlay.style.display = "none";
      document.body.style.overflow = "";
    }

    function spin() {
      closeVideoModal();

      playSound(clickSound, 0.8);
      setTimeout(() => playSound(spinSound, 0.9), 180);

      spinBtn.disabled = true;
      spinBtn.innerText = "摇一摇中...";
      machine.classList.add("shake");

      fallingEgg.classList.remove("egg-crack");
      fallingEgg.style.display = "none";

      setTimeout(() => {
        machine.classList.remove("shake");

        fallingEgg.style.display = "block";

        setTimeout(() => {
          playSound(popSound, 0.95);
          fallingEgg.classList.add("egg-crack");

          setTimeout(() => {
            fallingEgg.style.display = "none";
            const selectedVideo = getRandomVideo();
            openVideo(selectedVideo);

            spinBtn.disabled = false;
            spinBtn.innerText = "再摇一次";
          }, 420);
        }, 900);
      }, 1600);
    }

    spinBtn.addEventListener("click", spin);
    closeVideo.addEventListener("click", closeVideoModal);
    playAgainBtn.addEventListener("click", spin);

    replayBtn.addEventListener("click", () => {
      if (!currentVideo) return;
      resultVideo.currentTime = 0;
      resultVideo.play();
    });
  </script>
</body>
</html>
